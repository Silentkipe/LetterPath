<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LetterPath">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234A90B8'/><text y='.85em' font-size='72' x='50%' text-anchor='middle'>✍️</text></svg>">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="LetterPath">
<meta name="theme-color" content="#4A90B8">
<link id="pwa-manifest" rel="manifest">
<title>LetterPath</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F0EB; --card:#FFFFFF;
  --primary:#4A90B8; --primary-lt:#D6EAF4;
  --accent:#F0883E; --success:#48B07C; --danger:#D94F4F;
  --text:#263040; --soft:#7A8898; --border:#E2D9CE;
  --shadow:rgba(38,48,64,0.09);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Nunito','Cairo',sans-serif;background:var(--bg);color:var(--text)}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  padding:0;overflow-y:auto;transition:opacity .22s ease,transform .22s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(14px)}
.rtl{direction:rtl}
.rtl *{font-family:'Cairo','Nunito',sans-serif}

/* ── LANGUAGE ── */
#screen-language{justify-content:center;gap:14px;padding:28px 20px}
.lang-logo{font-size:68px;line-height:1}
.lang-title{font-size:36px;font-weight:900;color:var(--primary);letter-spacing:-.5px}
.lang-sub{font-size:14px;color:var(--soft);text-align:center;max-width:300px;line-height:1.6;margin-bottom:8px}
.lang-btn{width:100%;max-width:360px;padding:19px 24px;border:none;border-radius:18px;
  font-size:22px;font-weight:800;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 18px var(--shadow);transition:transform .12s}
.lang-btn:active{transform:scale(.97)}
.lang-btn.en{background:var(--primary);color:#fff}
.lang-btn.fr{background:var(--accent);color:#fff}
.lang-btn.ar{background:var(--success);color:#fff;font-family:'Cairo',sans-serif}

/* ── MODE SELECT ── */
#screen-mode{justify-content:center;gap:20px;padding:28px 20px}
.mode-title{font-size:28px;font-weight:900;color:var(--text);text-align:center;line-height:1.3}
.mode-sub{font-size:15px;color:var(--soft);text-align:center;max-width:320px;line-height:1.5}
.mode-cards{width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px}
.mode-card{
  width:100%;padding:22px 22px;border:3px solid var(--border);border-radius:22px;
  background:var(--card);cursor:pointer;text-align:left;font-family:inherit;
  box-shadow:0 4px 18px var(--shadow);transition:all .15s;
  display:flex;align-items:center;gap:18px;
}
.mode-card:active{transform:scale(.97)}
.mode-card.selected{border-color:var(--primary);background:var(--primary-lt)}
.mode-icon{font-size:46px;line-height:1;flex-shrink:0}
.mode-info{}
.mode-name{font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px}
.mode-desc{font-size:13px;color:var(--soft);font-weight:600;line-height:1.4}
.mode-continue{
  width:100%;max-width:420px;padding:20px;border:none;
  background:var(--primary);color:#fff;border-radius:16px;
  font-size:20px;font-weight:900;font-family:inherit;cursor:pointer;
  box-shadow:0 6px 22px rgba(74,144,184,.3);transition:transform .12s;
}
.mode-continue:active{transform:scale(.97)}

/* ── HOME ── */
#screen-home{justify-content:flex-start;padding:48px 20px 24px;gap:14px}
.home-bar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between}
.app-wordmark{font-size:20px;font-weight:900;color:var(--primary);display:flex;align-items:center;gap:8px}
.icon-btn{width:48px;height:48px;border:none;background:var(--card);border-radius:14px;
  font-size:20px;cursor:pointer;box-shadow:0 2px 10px var(--shadow);
  display:flex;align-items:center;justify-content:center;transition:transform .1s}
.icon-btn:active{transform:scale(.92)}
.main-card{width:100%;max-width:480px;background:var(--card);border-radius:24px;
  padding:26px 22px;box-shadow:0 6px 28px var(--shadow)}
.home-greeting{font-size:25px;font-weight:900;margin-bottom:3px}
.home-sub{font-size:14px;color:var(--soft);margin-bottom:14px}
.mode-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mode-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-lt);color:var(--primary);
  border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;
}
.switch-mode-btn{
  padding:6px 12px;border:2px solid var(--border);border-radius:10px;
  background:transparent;font-size:12px;font-weight:800;font-family:inherit;
  color:var(--soft);cursor:pointer;transition:all .13s;
}
.switch-mode-btn:active{border-color:var(--primary);color:var(--primary)}
.stage-tag{display:inline-flex;align-items:center;gap:6px;background:var(--primary-lt);
  color:var(--primary);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:800;margin-bottom:16px}
.prog-lbl{font-size:12px;font-weight:800;color:var(--soft);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.06em}
.prog-bar{height:10px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:22px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));
  border-radius:99px;transition:width .8s ease}
.start-btn{width:100%;padding:20px;border:none;background:var(--primary);color:#fff;
  border-radius:16px;font-size:21px;font-weight:900;font-family:inherit;cursor:pointer;
  box-shadow:0 6px 22px rgba(74,144,184,.3);display:flex;align-items:center;
  justify-content:center;gap:10px;transition:transform .12s}
.start-btn:active{transform:scale(.98)}
.stats-row{width:100%;max-width:480px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{background:var(--card);border-radius:18px;padding:18px 16px;text-align:center;
  box-shadow:0 2px 12px var(--shadow)}
.stat-num{font-size:34px;font-weight:900;color:var(--primary)}
.stat-lbl{font-size:11px;color:var(--soft);font-weight:700;margin-top:3px;
  text-transform:uppercase;letter-spacing:.05em}

/* ── SETTINGS ── */
#screen-settings{justify-content:flex-start;padding:48px 20px 32px;gap:14px}
.settings-bar{width:100%;max-width:480px;display:flex;align-items:center;gap:14px}
.settings-heading{font-size:22px;font-weight:900}
.s-card{width:100%;max-width:480px;background:var(--card);border-radius:20px;
  padding:18px 20px;box-shadow:0 2px 12px var(--shadow)}
.s-card-lbl{font-size:11px;font-weight:800;color:var(--soft);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.s-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none;padding-bottom:0}
.s-name{font-size:16px;font-weight:700}
.s-desc{font-size:12px;color:var(--soft);margin-top:2px}
.tgl-group{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tgl{padding:8px 14px;border:2px solid var(--border);border-radius:10px;
  background:transparent;font-size:13px;font-weight:800;font-family:inherit;
  color:var(--soft);cursor:pointer;transition:all .14s}
.tgl.on{border-color:var(--primary);background:var(--primary);color:#fff}
.reset-btn{width:100%;max-width:480px;padding:16px;border:2px solid var(--danger);
  background:transparent;color:var(--danger);border-radius:14px;
  font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .14s}
.reset-btn:active{background:var(--danger);color:#fff}
.voice-list{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px;max-height:180px;overflow-y:auto}
.voice-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border:2px solid var(--border);border-radius:14px;
  background:transparent;font-family:inherit;cursor:pointer;gap:10px;transition:all .14s;text-align:left}
.voice-item:active{transform:scale(.98)}
.voice-item.on{border-color:var(--primary);background:var(--primary-lt)}
.voice-name{font-size:14px;font-weight:800;color:var(--text);flex:1;line-height:1.3}
.voice-locale{font-size:11px;color:var(--soft);font-weight:700;white-space:nowrap}
.voice-preview{width:36px;height:36px;border:none;border-radius:10px;
  background:var(--primary);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.voice-preview:active{transform:scale(.9)}
.voice-none{font-size:13px;color:var(--soft);font-weight:700;padding:8px 0;text-align:center;line-height:1.5}

/* ── EXERCISE SHARED ── */
#screen-exercise{justify-content:flex-start;padding:0;gap:0}
.ex-header{width:100%;padding:14px 16px 8px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.ex-dots{flex:1;display:flex;justify-content:center;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.done{background:var(--success)}
.dot.current{background:var(--primary);transform:scale(1.4)}
.ex-spacer{min-width:48px}
.ex-body{flex:1;width:100%;display:flex;flex-direction:column;
  align-items:center;padding:6px 16px 14px;gap:8px;overflow:hidden}

/* ── TRACE MODE ── */
.letter-info{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.letter-emoji{font-size:44px;line-height:1}
.letter-word-hint{font-size:18px;font-weight:700;color:var(--soft)}
.trace-phase{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.canvas-container{width:100%;flex:1;min-height:0;position:relative;
  border-radius:20px;overflow:hidden;background:white;
  border:2px dashed var(--border);box-shadow:0 4px 20px var(--shadow)}
#trace-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.coverage-bar-wrap{width:100%;max-width:460px;height:8px;
  background:var(--border);border-radius:99px;overflow:hidden;flex-shrink:0}
.coverage-bar{height:100%;width:0%;
  background:linear-gradient(90deg,var(--primary),var(--success));
  border-radius:99px;transition:width .2s ease}
.trace-instruction{font-size:16px;font-weight:700;color:var(--soft);
  text-align:center;flex-shrink:0;display:flex;align-items:center;gap:8px}
.hear-btn{padding:11px 26px;border:2.5px solid var(--primary);
  background:transparent;color:var(--primary);border-radius:50px;
  font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all .14s;flex-shrink:0}
.hear-btn:active{background:var(--primary);color:#fff}
.canvas-success{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:rgba(72,176,124,.12);opacity:0;
  transition:opacity .35s;pointer-events:none;border-radius:18px}
.canvas-success.show{opacity:1}
.success-checkmark{font-size:64px;animation:popIn .4s cubic-bezier(.17,.67,.42,1.4) both}
.success-label{font-size:22px;font-weight:900;color:var(--success)}

/* quiz */
.quiz-phase{width:100%;flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px}
.quiz-question{font-size:20px;font-weight:800;color:var(--text);
  text-align:center;max-width:320px;line-height:1.4}
.quiz-choices{width:100%;max-width:400px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.choice-btn{aspect-ratio:1;border:3px solid var(--border);background:var(--card);border-radius:18px;
  font-size:52px;font-weight:900;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text);line-height:1;
  box-shadow:0 4px 14px var(--shadow);transition:transform .12s,border-color .15s,background .15s}
.choice-btn:active{transform:scale(.94)}
.choice-btn.word-btn{font-size:22px;aspect-ratio:unset;padding:18px 10px;min-height:80px}
.choice-btn.ar-font{font-family:'Cairo','Nunito',sans-serif;font-size:28px}
.choice-btn.correct{border-color:var(--success);background:#E8F8F0;animation:correctPop .4s ease both}
.choice-btn.wrong{border-color:var(--danger);background:#FDEAEA;animation:shake .35s ease both}
.choice-btn.reveal{border-color:var(--success);background:#E8F8F0;opacity:.7}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.quiz-next-wrap{width:100%;max-width:400px;margin-top:6px;display:none}
.quiz-next-wrap.show{display:block}
.quiz-next-btn{width:100%;padding:18px;border:none;background:var(--primary);color:#fff;
  border-radius:16px;font-size:18px;font-weight:900;font-family:inherit;cursor:pointer;
  box-shadow:0 5px 18px rgba(74,144,184,.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
  animation:slideUp .35s cubic-bezier(.17,.67,.42,1.2) both}
.quiz-next-btn:active{transform:scale(.97)}
.wrong-hint{width:100%;max-width:400px;background:#FFF5F5;border:2px solid #F9D0D0;
  border-radius:14px;padding:12px 16px;text-align:center;
  font-size:14px;font-weight:700;color:var(--danger);line-height:1.5;
  display:none;animation:slideUp .3s ease both}
.wrong-hint.show{display:block}

/* ── WRITE MODE ── */
.write-phase{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.target-card{width:100%;max-width:460px;flex-shrink:0;background:var(--card);border-radius:20px;
  padding:14px 20px;box-shadow:0 3px 14px var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.target-left{display:flex;align-items:center;gap:14px}
.target-emoji{font-size:36px;line-height:1;flex-shrink:0}
.target-letter{font-size:72px;font-weight:900;line-height:1;color:var(--primary);font-family:'Nunito',sans-serif}
.target-letter.ar-font{font-family:'Cairo',sans-serif}
.target-word{font-size:16px;font-weight:700;color:var(--soft);margin-top:2px}
.hear-mini{width:44px;height:44px;border:2.5px solid var(--primary);background:transparent;
  color:var(--primary);border-radius:12px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.hear-mini:active{background:var(--primary);color:#fff}
.write-wrap{width:100%;max-width:460px;flex:1;min-height:0;position:relative;
  border-radius:20px;overflow:hidden;background:white;
  border:3px solid var(--border);box-shadow:0 4px 20px var(--shadow);transition:border-color .3s}
.write-wrap.validating{border-color:var(--primary)}
.write-wrap.success{border-color:var(--success);box-shadow:0 4px 20px rgba(72,176,124,.25)}
.write-wrap.error{border-color:var(--danger);box-shadow:0 4px 20px rgba(217,79,79,.2)}
#write-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
.write-placeholder{position:absolute;inset:0;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;opacity:1;transition:opacity .3s}
.write-placeholder.gone{opacity:0}
.write-placeholder-icon{font-size:36px}
.write-placeholder-txt{font-size:16px;font-weight:700;color:var(--soft)}
.thinking-bar{position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--primary),var(--success),var(--primary));
  background-size:200% 100%;animation:shimmer 1.2s linear infinite;
  opacity:0;transition:opacity .2s}
.thinking-bar.show{opacity:1}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.wait-ring{position:absolute;top:10px;right:12px;width:28px;height:28px;
  border:3px solid var(--primary-lt);border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite;opacity:0;transition:opacity .2s}
.wait-ring.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
.write-feedback{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;border-radius:17px;
  opacity:0;transition:opacity .3s;pointer-events:none}
.write-feedback.show{opacity:1;pointer-events:all}
.write-feedback.success-fb{background:rgba(72,176,124,.13)}
.write-feedback.error-fb{background:rgba(217,79,79,.08)}
.fb-icon{font-size:58px;animation:popIn .4s cubic-bezier(.17,.67,.42,1.4) both}
.fb-msg{font-size:20px;font-weight:900;text-align:center;padding:0 20px;line-height:1.3}
.fb-msg.ok{color:var(--success)}
.fb-msg.bad{color:var(--danger)}
.fb-seen{font-size:14px;font-weight:700;color:var(--soft);text-align:center;padding:0 20px;margin-top:4px;opacity:.85}
.write-actions{width:100%;max-width:460px;flex-shrink:0;display:flex;gap:10px}
.clear-btn{padding:14px 20px;border:2px solid var(--border);background:transparent;
  color:var(--soft);border-radius:14px;font-size:16px;font-weight:800;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .14s;flex-shrink:0}
.clear-btn:active{background:var(--border)}
.done-btn{flex:1;padding:14px;border:none;background:var(--primary);color:#fff;
  border-radius:14px;font-size:17px;font-weight:900;font-family:inherit;cursor:pointer;
  box-shadow:0 4px 16px rgba(74,144,184,.28);
  display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s}
.done-btn:active{transform:scale(.97)}
.done-btn:disabled{opacity:.45;pointer-events:none}
.write-next-btn{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  padding:14px 36px;border:none;background:var(--primary);color:#fff;
  border-radius:50px;font-size:17px;font-weight:900;font-family:inherit;
  cursor:pointer;box-shadow:0 5px 18px rgba(74,144,184,.35);white-space:nowrap;
  animation:slideUpCenter .35s cubic-bezier(.17,.67,.42,1.2) both}
@keyframes slideUpCenter{from{opacity:0;transform:translateX(-50%) translateY(14px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}}
.write-next-btn:active{transform:translateX(-50%) scale(.97)}

/* ── SHARED ANIMATIONS ── */
@keyframes popIn{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── CELEBRATION ── */
#screen-celebration{justify-content:center;gap:16px;text-align:center;padding:28px 20px}
.confetti-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}
.cf{position:absolute;animation:cffall 2.2s ease-in forwards}
@keyframes cffall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cel-icon{font-size:74px;animation:bounce .55s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-13px)}}
.cel-title{font-size:36px;font-weight:900;color:var(--primary)}
.cel-sub{font-size:16px;color:var(--soft)}
.cel-score{font-size:58px;font-weight:900;color:var(--accent)}
.cel-actions{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
.cel-primary{padding:20px;border:none;background:var(--primary);color:#fff;
  border-radius:16px;font-size:20px;font-weight:900;font-family:inherit;cursor:pointer;
  box-shadow:0 6px 22px rgba(74,144,184,.3);transition:transform .12s}
.cel-primary:active{transform:scale(.97)}
.cel-ghost{padding:18px;border:2px solid var(--border);background:transparent;
  color:var(--soft);border-radius:16px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer}

@media(max-height:700px){
  .letter-emoji{font-size:32px} .choice-btn{font-size:38px;border-radius:14px}
  .choice-btn.word-btn{font-size:18px;min-height:64px} .quiz-question{font-size:17px}
  .target-letter{font-size:54px} .target-emoji{font-size:28px}
}
@media(max-height:600px){
  .letter-emoji{font-size:26px} .letter-word-hint{font-size:15px}
}
@media(min-width:480px){
  .quiz-choices{max-width:440px} .choice-btn{font-size:60px}
}
</style>
</head>
<body>

<!-- ══ LANGUAGE ══ -->
<div id="screen-language" class="screen">

let coverageCount  = 0;     // letter pixels the finger has painted over
let totalBrushPx   = 0;     // ALL canvas pixels the brush touched (on or off letter)

// Typed-array pixel tracking — no Sets, no slowdown
let paintedPixels  = null;  // Uint8Array(W*H): 1 if this pixel has been traced (on-letter)
let brushedPixels  = null;  // Uint8Array(W*H): 1 if the brush passed this pixel at all

// Arabic cluster tracking (typed arrays, fast)
let clusterOf      = null;  // Int32Array(W*H): cluster ID per letter pixel (-1 = not letter)
let clusterSizes   = null;  // Int32Array(N): size of each cluster
let clusterHits    = null;  // Int32Array(N): painted pixels per cluster
let clusterCount   = 0;

let tracingDone    = false;
let traceDrawing   = false;

// How much of the letter must be coloured in
// Coverage: fraction of the solid letter area that the brush has coloured.
// Outline-tracing with a ~28px brush covers ~55-65% of a solid letter in one pass.
const COVERAGE_THRESHOLD  = 0.62;
// Precision: fraction of brush pixels that land ON the letter (vs off into blank space).
// When tracing an edge, ~50% of each stroke straddles the boundary → precision ~0.45.
// A canvas-wide scribble on a letter that fills 20% of canvas → precision ~0.20.
// Setting to 0.28 blocks wide scribbles while allowing outline tracing.
const PRECISION_THRESHOLD = 0.28;
const DOT_THRESHOLD       = 0.30;

// ── Write canvas state ──
let writeCanvas, writeCtx;
let hasDrawn     = false;
let idleTimer    = null;
let isChecking   = false;
let writeDrawing = false;
const IDLE_WAIT  = 1800;
// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  // Load saved state
  try{ const s=localStorage.getItem('lp_st'); if(s) state=JSON.parse(s); }catch(e){}
  // Load saved progress and ensure all three language keys exist
  try{
    const p=localStorage.getItem('lp_pr');
    if(p){
      const saved=JSON.parse(p);
      ['en','fr','ar'].forEach(l=>{ progress[l]=saved[l]||makeProgress(); });
    }
  }catch(e){}

  traceCanvas = $('trace-canvas');
  traceCtx    = traceCanvas.getContext('2d');
  writeCanvas = $('write-canvas');
  writeCtx    = writeCanvas.getContext('2d');

  setupTraceEvents();
  setupWriteEvents();
  loadVoices();
  injectManifest();

  if(!state.language) showScreen('language');
  else if(!state.mode) showScreen('mode');
  else showScreen('home');
}

function injectManifest(){
  try{
    const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%234A90B8'/><text y='380' x='256' font-size='320' text-anchor='middle'>✍️</text></svg>`;
    const m={name:'LetterPath',short_name:'LetterPath',
      description:"Letter therapy for stroke and Parkinson's recovery",
      start_url:'./',scope:'./',display:'standalone',
      display_override:['standalone','minimal-ui'],
      background_color:'#F5F0EB',theme_color:'#4A90B8',orientation:'portrait',
      icons:[
        {src:`data:image/svg+xml,${encodeURIComponent(svg)}`,sizes:'192x192',type:'image/svg+xml',purpose:'any'},
        {src:`data:image/svg+xml,${encodeURIComponent(svg)}`,sizes:'512x512',type:'image/svg+xml',purpose:'maskable any'}
      ]};
    const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
    const link=$('pwa-manifest');
    link.href=URL.createObjectURL(blob);
  }catch(e){}
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const el=$('screen-'+name);
  if(!el) return;
  el.classList.remove('hidden');
  el.classList.toggle('rtl', state.language==='ar');

  if(name==='home')     renderHome();
  if(name==='settings') renderSettings();
  if(name==='mode')     renderModeScreen();
  // NOTE: exercise screen resize is handled directly inside showTraceItem / showWriteItem
  // after the UI divs are made visible — no setTimeout needed here.
}

// ═══════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════
const SESSION_SIZE = 8;

function startSession(){
  const lang = state.language||'en';
  const prog = progress[lang]||makeProgress();
  const all  = stageItems();

  // Score items by how much they need practice
  const scored = all.map(item=>{
    const r = prog.items[item]||{correct:0,wrong:0,lastSeen:0};
    const tot = r.correct+(r.wrong||0);
    const score = tot===0 ? 100 : (1-r.correct/tot)*60 + Math.min((Date.now()-(r.lastSeen||0))/86400000*10, 40);
    return {item, score};
  });
  scored.sort((a,b) => b.score-a.score);
  const picked = shuffle(scored.slice(0, SESSION_SIZE).map(x=>x.item));

  session = {items:picked, idx:0, results:[]};
  showScreen('exercise');
  buildDots();
  showItem();
}

// ═══════════════════════════════════════════════════
// ITEM ROUTER
// ═══════════════════════════════════════════════════
function showItem(){
  const isWrite = state.mode === 'write';
  // Make only the relevant UI visible — the other stays display:none
  $('trace-ui').style.display = isWrite ? 'none' : 'flex';
  $('write-ui').style.display = isWrite ? 'flex' : 'none';
  $('screen-exercise').classList.toggle('rtl', state.language==='ar');
  buildDots();

  // IMPORTANT: call resize AFTER setting display:flex.
  // getBoundingClientRect() forces a synchronous reflow so we get real dimensions immediately.
  if(isWrite) showWriteItem();
  else        showTraceItem();
}

function advance(){
  session.idx++;
  if(session.idx >= session.items.length){ endSession(); return; }
  showItem();
}

function recordAnswer(item, correct){
  const lang = state.language||'en';
  const prog = progress[lang];
  if(!prog.items[item]) prog.items[item] = {correct:0, wrong:0, lastSeen:0};
  if(correct){
    prog.items[item].correct++;
    prog.totalCorrect = (prog.totalCorrect||0)+1;
  } else {
    prog.items[item].wrong = (prog.items[item].wrong||0)+1;
  }
  prog.items[item].lastSeen = Date.now();
  session.results.push({item, correct});
  saveProgress();
}

function speakCurrent(){
  const item = session.items[session.idx];
  const c    = d();
  const lang = state.language||'en';
  const word = state.stage===1 ? (c.word[item]||'') : '';
  const like = {en:'like', fr:'comme', ar:'مثل'}[lang]||'like';
  speak(word ? `${item} ${like} ${word}` : item, c.ttsLang);
}

function showTraceItem(){
  const c    = d();
  const item = session.items[session.idx];
  const s1   = state.stage===1;

  // Reset trace state
  tracingDone = false;
  $('canvas-success').classList.remove('show');
  $('quiz-phase').style.display = 'none';
  $('trace-ui').querySelector('.trace-phase').style.display = 'flex';

  if(s1){
    $('item-emoji').textContent    = c.emoji[item]||'';
    $('item-hint').textContent     = c.word[item]||'';
    $('letter-info').style.display = 'flex';
  } else {
    $('item-emoji').textContent    = '';
    $('item-hint').textContent     = '';
    $('letter-info').style.display = 'none';
  }
  $('hear-txt').textContent = t('hearIt');
  $('trace-instr').textContent = s1 ? t('traceInstr') : t('traceInstr23');
  $('trace-instr').style.display = 'flex';

  if(s1){
    // Resize now — getBoundingClientRect forces a synchronous reflow since
    // trace-ui was just switched to display:flex. No timeout needed.
    resizeTraceCanvas();
    renderLetterGuide(item);
    setTimeout(()=>speakCurrent(), 600);
  } else {
    resizeTraceCanvas();
    renderWordGuide(item);
    speakCurrent();
    const dur = Math.max(1200, item.length*65)+1200;
    setTimeout(()=>enterQuizPhase(item), dur);
  }
}

// ── BUG-FREE letter rendering ──
function resizeTraceCanvas(){
  const container = $('canvas-container');
  if(!container) return;
  const r   = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  if(r.width===0 || r.height===0) return; // nothing to size yet
  traceCanvas.width  = Math.round(r.width  * dpr);
  traceCanvas.height = Math.round(r.height * dpr);
  traceCanvas.style.width  = r.width  + 'px';
  traceCanvas.style.height = r.height + 'px';
  traceCtx.scale(dpr, dpr); // context is reset by setting .width; apply scale fresh
}

function renderLetterGuide(letter){
  const dpr = window.devicePixelRatio||1;
  const W   = traceCanvas.clientWidth;  // logical (CSS) pixels
  const H   = traceCanvas.clientHeight;
  if(W===0 || H===0) return;           // guard — canvas not laid out yet

  const isAr = state.language==='ar';
  const fam  = isAr ? 'Cairo,sans-serif' : 'Nunito,sans-serif';
  const fSize= Math.min(H*0.70, W*0.57);

  // ── Build a pixel-accurate silhouette mask using an offscreen canvas ──
  // The offscreen canvas works in physical pixels (dpr scaling applied).
  const offW = traceCanvas.width;  // physical
  const offH = traceCanvas.height;
  const off  = document.createElement('canvas');
  off.width  = offW;
  off.height = offH;
  const octx = off.getContext('2d');
  octx.save();
  octx.scale(dpr, dpr);
  octx.font = `900 ${fSize}px ${fam}`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle'; octx.fillStyle = '#000';
  octx.fillText(letter, W/2, H/2);
  octx.restore();

  letterMask = octx.getImageData(0, 0, offW, offH);
  const alpha = letterMask.data;

  // ── Count opaque pixels and build typed-array structures (no Sets!) ──
  coverageTarget = 0;
  for(let i=0; i<offW*offH; i++) if(alpha[i*4+3]>60) coverageTarget++;
  coverageCount = 0;
  totalBrushPx  = 0;
  paintedPixels = new Uint8Array(offW * offH);
  brushedPixels = new Uint8Array(offW * offH);

  // ── Connected-component labelling for Arabic dot enforcement ──
  // Uses Int32Array throughout — O(1) per pixel, no GC pressure
  if(isAr){
    const visited = new Uint8Array(offW * offH);
    const cOf     = new Int32Array(offW * offH).fill(-1);
    const cSizes  = [];
    let   nid     = 0;

    for(let y=0; y<offH; y++){
      for(let x=0; x<offW; x++){
        const i = y*offW + x;
        if(visited[i] || alpha[i*4+3]<=60) continue;
        // BFS — iterative, uses plain array as queue with head pointer (no stack overflow)
        const id  = nid++;
        cSizes.push(0);
        const q   = [i];
        let head  = 0;
        cOf[i]    = id;
        visited[i]= 1;
        while(head < q.length){
          const cur = q[head++];
          cSizes[id]++;
          const cx = cur % offW;
          const cy = (cur / offW)|0;
          if(cx>0){        const ni=cur-1;    if(!visited[ni]&&alpha[ni*4+3]>60){visited[ni]=1;cOf[ni]=id;q.push(ni);} }
          if(cx<offW-1){   const ni=cur+1;    if(!visited[ni]&&alpha[ni*4+3]>60){visited[ni]=1;cOf[ni]=id;q.push(ni);} }
          if(cy>0){        const ni=cur-offW; if(!visited[ni]&&alpha[ni*4+3]>60){visited[ni]=1;cOf[ni]=id;q.push(ni);} }
          if(cy<offH-1){   const ni=cur+offW; if(!visited[ni]&&alpha[ni*4+3]>60){visited[ni]=1;cOf[ni]=id;q.push(ni);} }
        }
      }
    }
    clusterOf    = cOf;
    clusterSizes = new Int32Array(cSizes);
    clusterHits  = new Int32Array(nid);
    clusterCount = nid;
  } else {
    // Not Arabic — skip cluster analysis
    clusterOf = clusterSizes = clusterHits = null;
    clusterCount = 0;
  }

  // ── Draw the letter guide: coloring-book style ──
  // Layer 1: solid filled letter in a soft blue — clearly shows where to trace
  // Layer 2: a thicker solid outline drawn OUTSIDE the letter so it acts as a boundary
  // Layer 3: a white inner glow so the center looks lighter and strokes show on top
  traceCtx.clearRect(0, 0, W, H);
  traceCtx.save();
  traceCtx.font = `900 ${fSize}px ${fam}`;
  traceCtx.textAlign = 'center';
  traceCtx.textBaseline = 'middle';

  // Outer glow / halo — wide stroke in very light blue, drawn first (behind everything)
  traceCtx.lineWidth   = 18;
  traceCtx.strokeStyle = 'rgba(74,144,184,0.10)';
  traceCtx.lineJoin    = 'round';
  traceCtx.setLineDash([]);
  traceCtx.strokeText(letter, W/2, H/2);

  // Main letter fill — medium opacity so user can see it clearly
  traceCtx.fillStyle = 'rgba(74,144,184,0.18)';
  traceCtx.fillText(letter, W/2, H/2);

  // Crisp dashed outline — thick enough to see, shows exactly where to trace
  traceCtx.setLineDash([9, 6]);
  traceCtx.lineWidth   = 4;
  traceCtx.strokeStyle = 'rgba(74,144,184,0.70)';
  traceCtx.strokeText(letter, W/2, H/2);
  traceCtx.setLineDash([]);

  traceCtx.restore();

  updateCovBar(0);
}

function renderWordGuide(word){
  const isAr = state.language==='ar';
  const fam  = isAr ? 'Cairo,sans-serif' : 'Nunito,sans-serif';
  const W    = traceCanvas.clientWidth;
  const H    = traceCanvas.clientHeight;
  const fSize= Math.min(H*0.38, W*0.22, 72);
  traceCtx.clearRect(0, 0, W, H);
  traceCtx.save();
  traceCtx.font = `900 ${fSize}px ${fam}`;
  traceCtx.textAlign = 'center'; traceCtx.textBaseline = 'middle';
  traceCtx.fillStyle = 'rgba(74,144,184,0.85)';
  traceCtx.fillText(word, W/2, H/2);
  traceCtx.restore();
}

function updateCovBar(ratio){
  $('cov-bar').style.width = Math.min(ratio*100, 100)+'%';
}

// ── Touch & Mouse handlers for trace canvas ──
function setupTraceEvents(){
  traceCanvas.addEventListener('touchstart', e=>{ e.preventDefault(); tDown(tPos(e)); }, {passive:false});
  traceCanvas.addEventListener('touchmove',  e=>{ e.preventDefault(); tMove(tPos(e)); }, {passive:false});
  traceCanvas.addEventListener('touchend',   e=>{ e.preventDefault(); tUp();          }, {passive:false});
  traceCanvas.addEventListener('mousedown',  e=>tDown(tPos(e)));
  traceCanvas.addEventListener('mousemove',  e=>{ if(traceDrawing) tMove(tPos(e)); });
  traceCanvas.addEventListener('mouseup',    tUp);
  window.addEventListener('resize', ()=>{
    if(!$('screen-exercise').classList.contains('hidden') && state.mode==='trace'){
      resizeTraceCanvas();
      // Re-render current item after resize so letter isn't lost
      const item = session.items && session.items[session.idx];
      if(item && state.stage===1) renderLetterGuide(item);
      else if(item) renderWordGuide(item);
    }
  });
}

function tPos(e){
  const r = traceCanvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return {x: s.clientX-r.left, y: s.clientY-r.top};
}

function tDown(p){
  if(tracingDone || state.mode!=='trace') return;
  traceDrawing = true;
  traceCtx.beginPath();
  traceCtx.moveTo(p.x, p.y);
  paintAt(p.x, p.y);
}

function tMove(p){
  if(!traceDrawing || tracingDone || state.mode!=='trace') return;
  traceCtx.lineTo(p.x, p.y);
  traceCtx.strokeStyle = 'rgba(74,144,184,0.9)';
  traceCtx.lineWidth   = Math.min(Math.max(22, traceCanvas.clientWidth*0.072), 38);
  traceCtx.lineCap     = 'round';
  traceCtx.lineJoin    = 'round';
  traceCtx.stroke();
  traceCtx.beginPath();
  traceCtx.moveTo(p.x, p.y);
  paintAt(p.x, p.y);
}

function tUp(){
  if(!traceDrawing) return;
  traceDrawing = false;
  if(state.mode!=='trace') return;

  const coverage  = coverageTarget>0 ? coverageCount/coverageTarget : 0;
  // Precision: fraction of brush-touched pixels that landed on the letter.
  // A single wide swipe or canvas-filling scribble will have very low precision.
  const precision = totalBrushPx>0 ? coverageCount/totalBrushPx : 0;

  updateCovBar(coverage);

  if(!tracingDone && coverage >= COVERAGE_THRESHOLD && precision >= PRECISION_THRESHOLD){
    // For Arabic: also require each dot cluster to be individually covered
    if(state.language==='ar' && clusterCount>1 && clusterOf){
      for(let id=0; id<clusterCount; id++){
        const sz = clusterSizes[id];
        if(sz>0 && (clusterHits[id]/sz) < DOT_THRESHOLD) return; // dot not covered yet
      }
    }
    tracingDone = true;
    onTracingComplete();
  }
}

function paintAt(lx, ly){
  if(!letterMask) return;
  const dpr    = window.devicePixelRatio||1;
  // Brush radius in physical pixels — matches the visible drawing stroke width
  // brushR in physical pixels — kept in sync with visual lineWidth in tMove
  const strokeW = Math.min(Math.max(22, traceCanvas.clientWidth*0.072), 38);
  const brushR  = Math.ceil(strokeW * dpr * 0.5);
  const mx     = Math.round(lx * dpr);
  const my     = Math.round(ly * dpr);
  const pW     = traceCanvas.width;  // physical width
  const pH     = traceCanvas.height;
  const alpha  = letterMask.data;

  for(let dy=-brushR; dy<=brushR; dy++){
    for(let dx=-brushR; dx<=brushR; dx++){
      if(dx*dx + dy*dy > brushR*brushR) continue; // circular brush
      const ix = mx+dx, iy = my+dy;
      if(ix<0 || iy<0 || ix>=pW || iy>=pH) continue;
      const pix = iy*pW + ix;

      // Track ALL brush pixels (for precision calculation)
      if(!brushedPixels[pix]){
        brushedPixels[pix] = 1;
        totalBrushPx++;
      }
      // Track ON-LETTER pixels (for coverage calculation)
      if(alpha[pix*4+3] > 60 && !paintedPixels[pix]){
        paintedPixels[pix] = 1;
        coverageCount++;
        if(clusterOf){
          const cid = clusterOf[pix];
          if(cid >= 0) clusterHits[cid]++;
        }
      }
    }
  }
  updateCovBar(coverageTarget>0 ? coverageCount/coverageTarget : 0);
}

function onTracingComplete(){
  const item = session.items[session.idx];
  $('success-label').textContent = item;
  $('canvas-success').classList.add('show');
  speakCurrent();
  setTimeout(()=>enterQuizPhase(item), 1500);
}

// ── Quiz (after tracing) ──
function enterQuizPhase(item){
  $('trace-ui').querySelector('.trace-phase').style.display = 'none';
  $('quiz-phase').style.display = 'flex';
  const isAr = state.language==='ar';
  const s1   = state.stage===1;
  $('quiz-q').textContent = s1 ? t('quizQ1') : t('quizQ2');

  const all        = stageItems();
  const distractors= buildDistr(item, all, 2);
  const choices    = shuffle([item, ...distractors]);
  const wrap       = $('quiz-choices');
  wrap.innerHTML   = '';
  choices.forEach(ch=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (!s1?' word-btn':'') + (isAr?' ar-font':'');
    btn.textContent = ch;
    btn.onclick = ()=>onQuizAnswer(ch, item);
    wrap.appendChild(btn);
  });
  $('quiz-next-wrap').classList.remove('show');
  $('wrong-hint').classList.remove('show');
  $('wrong-hint').textContent = '';
}

function buildDistr(correct, pool, count){
  const sim = (SIMILAR[correct]||[]).filter(x=>pool.includes(x));
  const oth = pool.filter(x=>x!==correct && !sim.includes(x));
  return [...shuffle(sim), ...shuffle(oth)].slice(0, count);
}

function onQuizAnswer(chosen, correct){
  const c = d();
  const lang = state.language||'en';
  const isCorrect = chosen===correct;
  const btns = $('quiz-choices').querySelectorAll('.choice-btn');
  btns.forEach(btn=>{
    btn.onclick = null;
    if(btn.textContent===correct && !isCorrect) btn.classList.add('reveal');
    if(btn.textContent===chosen) btn.classList.add(isCorrect?'correct':'wrong');
    if(isCorrect) btn.style.pointerEvents='none';
    else btn.onclick = ()=>speak(btn.textContent, c.ttsLang);
  });
  $('quiz-next-wrap').classList.remove('show');
  $('wrong-hint').classList.remove('show');
  if(isCorrect){
    speak(t('niceDone'), c.ttsLang);
    setTimeout(()=>advance(), 900);
  } else {
    setTimeout(()=>speak(correct, c.ttsLang), 500);
    const hints = {
      en:`You chose "${chosen}" — the correct answer is "${correct}". Tap any letter to hear it.`,
      fr:`Vous avez choisi "${chosen}" — la bonne réponse est "${correct}". Appuyez pour écouter.`,
      ar:`اخترت "${chosen}" — الإجابة الصحيحة هي "${correct}". انقر على أي حرف للاستماع.`
    };
    $('wrong-hint').textContent = hints[lang]||hints.en;
    setTimeout(()=>$('wrong-hint').classList.add('show'), 400);
    $('quiz-next-txt').textContent = t('nextBtn');
    setTimeout(()=>$('quiz-next-wrap').classList.add('show'), 800);
  }
  recordAnswer(correct, isCorrect);
}

// ═══════════════════════════════════════════════════
// WRITE MODE
// ═══════════════════════════════════════════════════
function showWriteItem(){
  const c    = d();
  const item = session.items[session.idx];
  const isAr = state.language==='ar';
  const s1   = state.stage===1;

  if(s1){
    $('write-emoji').textContent = c.emoji[item]||'';
    $('write-word').textContent  = c.word[item]||'';
  } else {
    $('write-emoji').textContent = '';
    $('write-word').textContent  = '';
  }
  const wl = $('write-letter');
  wl.textContent = item;
  wl.className   = 'target-letter'+(isAr?' ar-font':'');

  $('placeholder-txt').textContent = t('writePlaceholder');
  $('clear-txt').textContent       = t('clearBtn');
  $('done-txt').textContent        = t('checkBtn');

  // Resize now — write-ui is display:flex, getBoundingClientRect forces reflow
  resizeWriteCanvas();
  resetWriteArea();
  setTimeout(()=>speakCurrent(), 600);
}

function resizeWriteCanvas(){
  const wrap = $('write-wrap');
  if(!wrap) return;
  const r   = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  if(r.width===0 || r.height===0) return;
  writeCanvas.width  = Math.round(r.width  * dpr);
  writeCanvas.height = Math.round(r.height * dpr);
  writeCanvas.style.width  = r.width  + 'px';
  writeCanvas.style.height = r.height + 'px';
  writeCtx.scale(dpr, dpr);
}

function resetWriteArea(){
  // Clear only the drawn pixels, preserving canvas size
  writeCtx.clearRect(0, 0, writeCanvas.width, writeCanvas.height);
  hasDrawn   = false;
  isChecking = false;
  clearTimeout(idleTimer);
  const wrap = $('write-wrap');
  wrap.className = 'write-wrap';
  const fb = $('write-feedback');
  fb.className = 'write-feedback'; fb.innerHTML = '';
  const nb = wrap.querySelector('.write-next-btn');
  if(nb) nb.remove();
  $('write-placeholder').classList.remove('gone');
  $('thinking-bar').classList.remove('show');
  $('wait-ring').classList.remove('show');
  $('done-btn').disabled = true;
}

function clearWriteCanvas(){
  // Full clear including state reset — called by the 🗑 button
  writeCtx.clearRect(0, 0, writeCanvas.width, writeCanvas.height);
  hasDrawn   = false;
  isChecking = false;
  clearTimeout(idleTimer);
  const wrap = $('write-wrap');
  wrap.className = 'write-wrap';
  const fb = $('write-feedback');
  fb.className = 'write-feedback'; fb.innerHTML = '';
  const nb = wrap.querySelector('.write-next-btn');
  if(nb) nb.remove();
  $('write-placeholder').classList.remove('gone');
  $('thinking-bar').classList.remove('show');
  $('wait-ring').classList.remove('show');
  $('done-btn').disabled = true;
}

function setupWriteEvents(){
  writeCanvas.addEventListener('touchstart', e=>{ e.preventDefault(); wDown(wPos(e)); }, {passive:false});
  writeCanvas.addEventListener('touchmove',  e=>{ e.preventDefault(); wMove(wPos(e)); }, {passive:false});
  writeCanvas.addEventListener('touchend',   e=>{ e.preventDefault(); wUp();          }, {passive:false});
  writeCanvas.addEventListener('mousedown',  e=>wDown(wPos(e)));
  writeCanvas.addEventListener('mousemove',  e=>{ if(writeDrawing) wMove(wPos(e)); });
  writeCanvas.addEventListener('mouseup',    wUp);
  window.addEventListener('resize', ()=>{
    if(!$('screen-exercise').classList.contains('hidden') && state.mode==='write') resizeWriteCanvas();
  });
}

function wPos(e){
  const r = writeCanvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return {x: s.clientX-r.left, y: s.clientY-r.top};
}

function wDown(p){
  if(isChecking) return;
  writeDrawing = true;
  clearTimeout(idleTimer);
  $('wait-ring').classList.remove('show');
  writeCtx.beginPath();
  writeCtx.moveTo(p.x, p.y);
  if(!hasDrawn){
    hasDrawn = true;
    $('write-placeholder').classList.add('gone');
    $('done-btn').disabled = false;
  }
}

function wMove(p){
  if(!writeDrawing || isChecking) return;
  writeCtx.lineTo(p.x, p.y);
  writeCtx.strokeStyle = '#2C3E50';
  writeCtx.lineWidth   = Math.max(writeCanvas.clientWidth*0.03, 6);
  writeCtx.lineCap     = 'round';
  writeCtx.lineJoin    = 'round';
  writeCtx.stroke();
  writeCtx.beginPath();
  writeCtx.moveTo(p.x, p.y);
}

function wUp(){
  if(!writeDrawing) return;
  writeDrawing = false;
  if(!hasDrawn || isChecking) return;
  $('wait-ring').classList.add('show');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{
    $('wait-ring').classList.remove('show');
    submitWriting();
  }, IDLE_WAIT);
}

async function submitWriting(){
  if(!hasDrawn || isChecking) return;
  clearTimeout(idleTimer);
  $('wait-ring').classList.remove('show');
  isChecking = true;
  $('done-btn').disabled = true;

  const item  = session.items[session.idx];
  const stage = state.stage;
  const lang  = state.language||'en';
  const wrap  = $('write-wrap');
  wrap.className = 'write-wrap validating';
  $('thinking-bar').classList.add('show');

  // ── Prepare a clean 400x400 image: dark strokes on white background ──
  const SIZE = 400, PAD = 24;
  const offC = document.createElement('canvas');
  offC.width = SIZE; offC.height = SIZE;
  const offX = offC.getContext('2d');
  offX.fillStyle = '#ffffff';
  offX.fillRect(0, 0, SIZE, SIZE);
  offX.drawImage(writeCanvas, PAD, PAD, SIZE-PAD*2, SIZE-PAD*2);
  const imageData = offC.toDataURL('image/png').split(',')[1];

  // ── Blind recognition prompt — Claude does NOT know what letter is expected ──
  // This is the key: we ask "what is this?" not "is this X?"
  // A scribble returns "?" and fails. The correct letter returns the letter and passes.
  let prompt;
  if(stage === 1){
    prompt = `Look at this handwritten image. A single letter or character has been written on white paper.

What letter or character is written here? Look carefully and objectively — do not guess.

Reply ONLY with valid JSON, no other text:
{"letter": "X", "confidence": 85}

Rules:
- Use uppercase for Latin letters (A-Z)
- For Arabic, use the exact Arabic character
- confidence is 0-100: how certain you are
- If you cannot clearly identify a specific letter, use "?" for the letter and 0 for confidence
- A few wobbly strokes, a single short line, or a random scribble should get "?" not a letter guess`;
  } else {
    prompt = `Look at this handwritten image. A word has been written on white paper.

What word is written here? Look carefully and objectively.

Reply ONLY with valid JSON, no other text:
{"word": "the_word", "confidence": 85}

Rules:
- confidence is 0-100: how certain you are
- If you cannot clearly read a word, use "?" and confidence 0
- A few wobbly strokes or a scribble with no clear word shape should get "?" not a word guess`;
  }

  let correct  = false;
  let seenTxt  = '?'; // what Claude saw — shown to patient on failure

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 80,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/png', data: imageData } },
            { type: 'text',  text: prompt }
          ]
        }]
      })
    });
    const data   = await res.json();
    const raw    = (data.content||[]).map(x=>x.text||'').join('');
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    const conf   = Number(parsed.confidence)||0;

    if(stage === 1){
      const seen = (parsed.letter||'?').trim().toUpperCase();
      seenTxt  = seen;
      // Pass only if Claude confidently identifies the correct letter
      correct  = conf >= 55 && seen !== '?' && seen.toLowerCase() === item.toLowerCase();
    } else {
      const seen = (parsed.word||'?').trim().toLowerCase();
      seenTxt    = parsed.word||'?';
      const exp  = item.toLowerCase();
      // Pass if confident and within edit distance (allow for shaky spelling)
      const dist = levenshtein(seen, exp);
      const maxD = Math.max(1, Math.floor(exp.length * 0.25));
      correct    = conf >= 55 && seen !== '?' && dist <= maxD;
    }
  } catch(err){
    // If API call fails entirely, default to incorrect — don't give free passes
    correct = false;
    console.warn('AI recognition error:', err);
  }

  $('thinking-bar').classList.remove('show');
  wrap.className = 'write-wrap '+(correct ? 'success' : 'error');
  const c  = d();
  const fb = $('write-feedback');

  if(correct){
    fb.className = 'write-feedback show success-fb';
    fb.innerHTML = `<div class="fb-icon">✅</div><div class="fb-msg ok">${t('successMsg')}</div>`;
    speak(t('successMsg'), c.ttsLang);
    setTimeout(()=>advance(), 1400);
  } else {
    // Show the patient what was recognised so they understand the feedback
    const seenMsg = seenTxt && seenTxt !== '?'
      ? buildSeenMsg(seenTxt, item, lang)
      : '';
    fb.className = 'write-feedback show error-fb';
    fb.innerHTML = `<div class="fb-icon">✏️</div><div class="fb-msg bad">${t('wrongMsg')}</div>`
      + (seenMsg ? `<div class="fb-seen">${seenMsg}</div>` : '');
    speak(item, c.ttsLang);
    const btn = document.createElement('button');
    btn.className   = 'write-next-btn';
    btn.textContent = t('tryAgain');
    btn.onclick     = ()=>{ resetWriteArea(); resizeWriteCanvas(); speakCurrent(); };
    wrap.appendChild(btn);
  }
  recordAnswer(item, correct);
}

// Build a human-readable "I saw X" message for the patient
function buildSeenMsg(seen, expected, lang){
  if(lang === 'en') return `I saw: "${seen}" — expected: "${expected}"`;
  if(lang === 'fr') return `J'ai vu : « ${seen} » — attendu : « ${expected} »`;
  if(lang === 'ar') return `رأيت: "${seen}" — المطلوب: "${expected}"`;
  return `Saw: ${seen}`;
}

// Simple iterative Levenshtein distance (kept for word matching)
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const row = Array.from({length:n+1}, (_,i)=>i);
  for(let i=1; i<=m; i++){
    let prev=row[0]; row[0]=i;
    for(let j=1; j<=n; j++){
      const tmp=row[j];
      row[j] = a[i-1]===b[j-1] ? prev : 1+Math.min(prev, row[j], row[j-1]);
      prev=tmp;
    }
  }
  return row[n];
}
// ═══════════════════════════════════════════════════
// SESSION END
// ═══════════════════════════════════════════════════
function endSession(){
  const lang  = state.language||'en';
  const prog  = progress[lang];
  const today = new Date().toDateString();
  const yest  = new Date(Date.now()-86400000).toDateString();
  if(prog.lastDate!==today){
    prog.streak = prog.lastDate===yest ? (prog.streak||0)+1 : 1;
    prog.lastDate = today;
    saveProgress();
  }
  const correct = session.results.filter(r=>r.correct).length;
  const total   = session.results.length;

  showScreen('celebration');
  const isAr = state.language==='ar', isFr = state.language==='fr';
  $('cel-title').textContent = isAr?'أحسنت!':isFr?'Bravo !':'Well done! 🎉';
  $('cel-sub').textContent   = isAr?'انتهت الجلسة':isFr?'Session terminée':'Session complete';
  $('cel-score').textContent = `${correct}/${total} ⭐`;
  $('cel-keep').textContent  = isAr?'▶ استمر':isFr?'▶ Continuer':'▶ Keep Going';
  $('cel-home').textContent  = isAr?'🏠 الرئيسية':isFr?'🏠 Accueil':'🏠 Go Home';
  $('screen-celebration').classList.toggle('rtl', isAr);
  spawnConfetti();
  setTimeout(()=>speak(t('celSpeak'), d().ttsLang), 700);
}

// ═══════════════════════════════════════════════════
// PROGRESS DOTS
// ═══════════════════════════════════════════════════
function buildDots(){
  const c = $('ex-dots');
  c.innerHTML = '';
  session.items.forEach((_,i)=>{
    const dot = document.createElement('div');
    dot.className = 'dot';
    if(i < session.idx)  dot.classList.add('done');
    if(i === session.idx) dot.classList.add('current');
    c.appendChild(dot);
  });
}

// ═══════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════
function spawnConfetti(){
  const layer = $('confetti-layer');
  layer.innerHTML = '';
  const cols = ['#4A90B8','#F0883E','#48B07C','#FFD93D','#FF6B9D','#A8D5BA'];
  for(let i=0; i<55; i++){
    const p = document.createElement('div');
    p.className = 'cf';
    p.style.cssText = `left:${Math.random()*100}vw;top:-20px;
      background:${cols[i%cols.length]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${1.4+Math.random()*1.5}s;
      animation-delay:${Math.random()*.8}s;
      width:${8+Math.random()*9}px;height:${8+Math.random()*9}px`;
    layer.appendChild(p);
  }
}

// ═══════════════════════════════════════════════════
// VOICE / TTS
// ═══════════════════════════════════════════════════
let allVoices = [];

function loadVoices(){
  if(!window.speechSynthesis) return; // browser may not support TTS
  allVoices = window.speechSynthesis.getVoices();
  if(allVoices.length===0){
    window.speechSynthesis.addEventListener('voiceschanged', ()=>{
      allVoices = window.speechSynthesis.getVoices();
      if(!$('screen-settings').classList.contains('hidden')) renderVoices();
    }, {once:true});
  }
}

function voicesForLang(){
  if(!window.speechSynthesis) return [];
  const prefix = d().ttsLang.split('-')[0].toLowerCase();
  return allVoices.filter(v => v.lang.toLowerCase().startsWith(prefix));
}

function renderVoices(){
  if(!window.speechSynthesis){
    const wrap = $('voice-list');
    if(wrap) wrap.innerHTML = `<div class="voice-none">${t('voiceNone')}</div>`;
    return;
  }
  allVoices = window.speechSynthesis.getVoices();
  const wrap   = $('voice-list');
  if(!wrap) return;
  const voices = voicesForLang();
  wrap.innerHTML = '';
  if(!voices.length){
    wrap.innerHTML = `<div class="voice-none">${t('voiceNone')}</div>`;
    return;
  }
  voices.forEach((v,i)=>{
    const sel = state.voiceName===v.name || (!state.voiceName && i===0);
    const row = document.createElement('div');
    row.className = 'voice-item'+(sel?' on':'');
    const name = v.name.replace(/Microsoft |Google |Apple /g,'');
    // Safe text nodes to avoid HTML injection from voice names
    const nameDiv   = document.createElement('div');
    nameDiv.className = 'voice-name'; nameDiv.textContent = name;
    const localeDiv = document.createElement('div');
    localeDiv.className = 'voice-locale'; localeDiv.textContent = v.lang;
    const infoDiv = document.createElement('div');
    infoDiv.appendChild(nameDiv); infoDiv.appendChild(localeDiv);
    const prevBtn = document.createElement('button');
    prevBtn.className = 'voice-preview';
    prevBtn.textContent = '🔊';
    prevBtn.onclick = e=>{ e.stopPropagation(); previewVoice(v.name); };
    row.appendChild(infoDiv); row.appendChild(prevBtn);
    row.addEventListener('click', e=>{
      if(e.target.closest('.voice-preview')) return;
      state.voiceName = v.name; saveState(); renderVoices();
    });
    wrap.appendChild(row);
  });
}

function previewVoice(voiceName){
  if(!window.speechSynthesis) return;
  const v = allVoices.find(x=>x.name===voiceName);
  if(!v) return;
  const lang = state.language||'en';
  const samples = {
    en:'Hello, this is a sample voice.',
    fr:'Bonjour, voici un exemple de voix.',
    ar:'مرحباً، هذا مثال على الصوت.'
  };
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(samples[lang]||samples.en);
  u.voice = v; u.lang = v.lang; u.rate = state.speechRate||0.8;
  window.speechSynthesis.speak(u);
}

function speak(text, lang){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang   = lang||'en-US';
  u.rate   = state.speechRate||0.8;
  u.pitch  = 1.0;
  u.volume = 1.0;
  const voices   = voicesForLang();
  const selected = state.voiceName ? allVoices.find(v=>v.name===state.voiceName) : null;
  if(selected || voices[0]) u.voice = selected || voices[0];
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function saveState()   { try{ localStorage.setItem('lp_st', JSON.stringify(state));    }catch(e){} }
function saveProgress(){ try{ localStorage.setItem('lp_pr', JSON.stringify(progress)); }catch(e){} }

init();
</script>
